version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: judicial_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: judicial
      POSTGRES_PASSWORD: judicial
      POSTGRES_DB: judicial_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judicial -d judicial_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional GUI) ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: judicial_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@judicial.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
